name: Identify repositories for archival
on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  run-repo-sunsetter:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Run archival-identifier
        id: archive
        uses: DSACMS/archival-identifier@DSACMS/nat/mvp-again
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
